name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:

  shellcheck:
    name: Shell Script Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on all scripts
        run: |
          find cli -name "*.sh" | while read file; do
            echo "Checking: $file"
            shellcheck --severity=error "$file" || true
          done

  test-structure:
    name: Verify Project Structure
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Check required files exist
        run: |
          echo "Checking required files..."

          files=(
            "cli/setup.sh"
            "cli/flow/main.sh"
            "cli/flow/runner.sh"
            "cli/flow/prompt.sh"
            "cli/core/logger.sh"
            "cli/core/helpers.sh"
            "cli/core/defaults.sh"
            "cli/maven/pom/pom_builder.sh"
            "cli/maven/framework/framework_builder.sh"
            "README.md"
            "LICENSE"
          )

          all_ok=true
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "  ✔  $file"
            else
              echo "  ✖  MISSING: $file"
              all_ok=false
            fi
          done

          if [ "$all_ok" = false ]; then
            echo "Some required files are missing!"
            exit 1
          fi

          echo "All required files present."

      - name: Check configs exist
        run: |
          for level in beginner intermediate advanced default; do
            if [ -f "cli/config/$level.config" ]; then
              echo "  ✔  $level.config"
            else
              echo "  ✖  MISSING: $level.config"
              exit 1
            fi
          done
